<!-- بسم الله الرحمن الرحيم -->
<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Traced — Point Editor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a1a;color:#eee;font-family:'SF Mono',monospace;overflow:hidden}
#wrap{position:relative;display:inline-block}
#wrap img{display:block;max-height:100vh;max-width:100vw}
.pt{position:absolute;pointer-events:none;z-index:10}
.pt svg{display:block}
.pt .lbl{position:absolute;left:20px;top:-6px;font-size:11px;white-space:nowrap;background:rgba(0,0,0,0.85);padding:1px 5px;border-radius:2px;pointer-events:none}
.pt.active .lbl{background:rgba(255,255,255,0.9);color:#000}
.outer .lbl{color:#ff4444}
.inner .lbl{color:#4488ff}
#panel{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.92);padding:12px;border-radius:8px;z-index:100;max-height:90vh;overflow-y:auto;width:260px}
#panel h3{margin-bottom:8px;font-size:13px;color:#888}
.row{display:flex;justify-content:space-between;font-size:11px;padding:3px 4px;border-bottom:1px solid #333;cursor:pointer;border-radius:3px}
.row:hover{background:#333}
.row.active{background:#c0392b}
.row .k{color:#aaa}.row .v{color:#fff}
.row.active .k,.row.active .v{color:#fff}
button{margin-top:6px;padding:6px 12px;color:#fff;border:none;border-radius:4px;cursor:pointer;font-family:inherit;font-size:12px;width:100%}
#export{background:#c0392b}
#export:hover{background:#e74c3c}
#add{background:#2980b9}
#json-out{margin-top:8px;font-size:10px;color:#666;word-break:break-all;max-height:150px;overflow-y:auto}
</style>
</head><body>
<div id="wrap">
<img id="src" src="real-test-mono.jpg" onerror="this.src='https://cookmom.github.io/traced/real-test-mono.jpg'">
</div>
<div id="panel">
<h3>Feature Points <span id="active-label" style="color:#c0392b"></span></h3>
<div id="coords"></div>
<div style="margin:8px 0;display:flex;align-items:center;gap:6px">
<input type="checkbox" id="sym" checked onchange="symmetric=this.checked">
<label for="sym" style="font-size:11px;color:#aaa">Symmetric (L↔R)</label>
</div>
<div id="measures" style="margin-bottom:8px;border-top:1px solid #444;padding-top:6px"></div>
<button id="export" onclick="exportJSON()">📋 Copy JSON</button>
<button id="add" onclick="addPoint()">+ Add Point</button>
<div id="json-out"></div>
</div>

<script>
var points = [
  {id:'OA', x:387, y:136, label:'Outer Apex', cls:'outer'},
  {id:'OHL', x:100, y:480, label:'Outer HS Left', cls:'outer'},
  {id:'OHR', x:675, y:480, label:'Outer HS Right', cls:'outer'},
  {id:'OWL', x:85, y:380, label:'Outer Wide L', cls:'outer'},
  {id:'OWR', x:690, y:380, label:'Outer Wide R', cls:'outer'},
  {id:'IA', x:387, y:170, label:'Inner Apex', cls:'inner'},
  {id:'IHL', x:135, y:480, label:'Inner HS Left', cls:'inner'},
  {id:'IHR', x:640, y:480, label:'Inner HS Right', cls:'inner'},
  {id:'IWL', x:120, y:380, label:'Inner Wide L', cls:'inner'},
  {id:'IWR', x:655, y:380, label:'Inner Wide R', cls:'inner'},
  {id:'OLL', x:100, y:1218, label:'Outer Leg Btm L', cls:'outer'},
  {id:'OLR', x:675, y:1218, label:'Outer Leg Btm R', cls:'outer'},
  {id:'ILL', x:135, y:1218, label:'Inner Leg Btm L', cls:'inner'},
  {id:'ILR', x:640, y:1218, label:'Inner Leg Btm R', cls:'inner'},
];

var imgW=774, imgH=1280, scale=1;
var activeId = null;

function init(){
  var img = document.getElementById('src');
  img.onload = function(){
    scale = img.offsetWidth / imgW;
    renderPoints();
  };
  
  // Click on image = move active point there
  document.getElementById('wrap').addEventListener('click', function(e){
    if(!activeId) return;
    var rect = document.getElementById('wrap').getBoundingClientRect();
    var x = Math.round((e.clientX - rect.left) / scale);
    var y = Math.round((e.clientY - rect.top) / scale);
    var p = points.find(function(p){return p.id===activeId;});
    if(p){
      p.x = x; p.y = y;
      // Apply symmetry
      if(symmetric && symPairs[p.id]){
        var mirror = points.find(function(q){return q.id===symPairs[p.id];});
        if(mirror){
          mirror.x = 2*centerX - x;
          mirror.y = y;
        }
      }
      renderPoints();
    }
  });
}

function makeSVG(cls, active){
  var c = cls === 'outer' ? '#ff4444' : '#4488ff';
  if(active) c = '#ffffff';
  return '<svg width="24" height="24" viewBox="0 0 24 24">' +
    '<line x1="0" y1="12" x2="24" y2="12" stroke="'+c+'" stroke-width="2"/>' +
    '<line x1="12" y1="0" x2="12" y2="24" stroke="'+c+'" stroke-width="2"/>' +
    '<circle cx="12" cy="12" r="5" fill="none" stroke="'+c+'" stroke-width="2"/>' +
    '</svg>';
}

function renderPoints(){
  document.querySelectorAll('.pt').forEach(function(e){e.remove();});
  var wrap = document.getElementById('wrap');
  scale = document.getElementById('src').offsetWidth / imgW;
  
  points.forEach(function(p){
    var el = document.createElement('div');
    var isActive = p.id === activeId;
    el.className = 'pt ' + p.cls + (isActive ? ' active' : '');
    el.style.left = (p.x * scale - 12) + 'px';
    el.style.top = (p.y * scale - 12) + 'px';
    el.innerHTML = makeSVG(p.cls, isActive) + '<div class="lbl">' + p.id + '</div>';
    wrap.appendChild(el);
  });
  updatePanel();
  // Draw measurement lines
  var svg = document.getElementById('meas-svg');
  if(!svg){
    svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.id='meas-svg';
    svg.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5';
    wrap.appendChild(svg);
  }
  svg.innerHTML='';
  measurements.forEach(function(m){
    var pa = points.find(function(p){return p.id===m.a;});
    var pb = points.find(function(p){return p.id===m.b;});
    if(pa && pb){
      var line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',pa.x*scale);line.setAttribute('y1',pa.y*scale);
      line.setAttribute('x2',pb.x*scale);line.setAttribute('y2',pb.y*scale);
      line.setAttribute('stroke','rgba(255,255,0,0.4)');line.setAttribute('stroke-width','1');
      line.setAttribute('stroke-dasharray','4,4');
      svg.appendChild(line);
      var dx=pb.x-pa.x,dy=pb.y-pa.y;
      var dist=Math.round(Math.sqrt(dx*dx+dy*dy));
      var txt=document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x',(pa.x+pb.x)/2*scale);txt.setAttribute('y',(pa.y+pb.y)/2*scale-4);
      txt.setAttribute('fill','yellow');txt.setAttribute('font-size','10');txt.setAttribute('text-anchor','middle');
      txt.textContent=dist+'px';
      svg.appendChild(txt);
    }
  });
}

function selectPoint(id){
  activeId = (activeId === id) ? null : id;
  document.getElementById('active-label').textContent = activeId ? '→ ' + activeId : '';
  renderPoints();
}

function updatePanel(){
  var html = '';
  points.forEach(function(p){
    var ac = p.id === activeId ? ' active' : '';
    html += '<div class="row'+ac+'" onclick="selectPoint(\''+p.id+'\')">' +
      '<span class="k">'+p.id+'</span><span class="v">('+p.x+', '+p.y+')</span></div>';
  });
  document.getElementById('coords').innerHTML = html;
  // Measurements
  var mhtml = '';
  measurements.forEach(function(m){
    var pa = points.find(function(p){return p.id===m.a;});
    var pb = points.find(function(p){return p.id===m.b;});
    if(pa && pb){
      var dx = pb.x-pa.x, dy = pb.y-pa.y;
      var dist = Math.round(Math.sqrt(dx*dx+dy*dy));
      mhtml += '<div style="font-size:10px;color:#888;padding:1px 0">'+m.label+': <b style="color:#fff">'+dist+'px</b></div>';
    }
  });
  document.getElementById('measures').innerHTML = mhtml;
}

function exportJSON(){
  var obj = {};
  points.forEach(function(p){ obj[p.id] = {x:p.x, y:p.y, label:p.label}; });
  var json = JSON.stringify(obj, null, 2);
  navigator.clipboard.writeText(json).then(function(){
    document.getElementById('json-out').textContent = '✅ Copied!\n' + json;
  }).catch(function(){
    document.getElementById('json-out').textContent = json;
  });
}

function addPoint(){
  var id = prompt('Point ID:');
  if(!id) return;
  var label = prompt('Label:') || id;
  var cls = prompt('outer or inner?') || 'outer';
  points.push({id:id, x:Math.round(imgW/2), y:Math.round(imgH/2), label:label, cls:cls});
  activeId = id;
  renderPoints();
}


// Symmetry pairs: moving one mirrors the other around centerX
var centerX = 387;
var symPairs = {
  'OHL':'OHR', 'OHR':'OHL',
  'OWL':'OWR', 'OWR':'OWL',
  'IHL':'IHR', 'IHR':'IHL',
  'IWL':'IWR', 'IWR':'IWL',
  'OLL':'OLR', 'OLR':'OLL',
  'ILL':'ILR', 'ILR':'ILL',
};
var symmetric = true;

// Measurement pairs to show distances
var measurements = [
  {a:'OWL', b:'OWR', label:'Outer Width'},
  {a:'IWL', b:'IWR', label:'Inner Width'},
  {a:'OHL', b:'OHR', label:'Outer HS Width'},
  {a:'IHL', b:'IHR', label:'Inner HS Width'},
  {a:'OA', b:'IA', label:'Band at Apex'},
  {a:'OWL', b:'IWL', label:'Band Left'},
  {a:'OWR', b:'IWR', label:'Band Right'},
];

window.addEventListener('resize', renderPoints);
init();
</script>
</body></html>
