<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Traced — Point Editor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a1a;color:#eee;font-family:'SF Mono',monospace;overflow:hidden;touch-action:none}
#wrap{position:relative;display:inline-block;transform-origin:0 0}
#wrap img{display:block;max-height:100vh;max-width:100vw;-webkit-user-drag:none;user-select:none}
#panel{position:fixed;top:8px;right:8px;background:rgba(0,0,0,0.92);padding:10px;border-radius:8px;z-index:100;max-height:95vh;overflow-y:auto;width:220px;font-size:11px}
#panel h3{margin-bottom:6px;font-size:12px;color:#888}
.row{display:flex;justify-content:space-between;padding:3px 5px;border-bottom:1px solid #222;cursor:pointer;border-radius:3px}
.row:hover{background:#333}
.row.active{background:#444;outline:1px solid #fff}
.row .k{color:#aaa}.row .v{color:#fff}
#measures{border-top:1px solid #444;padding-top:4px;margin-top:4px}
label{display:flex;align-items:center;gap:5px;padding:3px 0;color:#aaa;font-size:11px}
button{margin-top:3px;padding:5px;color:#fff;border:none;border-radius:4px;cursor:pointer;font-family:inherit;font-size:11px;width:100%}
#export{background:#c0392b}
#add{background:#2980b9}
#json-out{margin-top:4px;font-size:9px;color:#555;max-height:100px;overflow-y:auto;word-break:break-all}
</style>
</head><body>
<div id="wrap"><img id="src" src="real-test-mono.jpg" onerror="this.src='https://cookmom.github.io/traced/real-test-mono.jpg'"><canvas id="cv" style="position:absolute;top:0;left:0;pointer-events:none;z-index:5"></canvas></div>
<div id="panel">
<h3>Points <span id="albl" style="color:#fff"></span></h3>
<div id="coords"></div>
<div id="measures"></div>
<label><input type="checkbox" id="sym" checked> Symmetric L↔R</label>
<button id="export" onclick="doExport()" style="background:#27ae60">💾 Save + Copy JSON</button>
<button id="add" onclick="doAdd()">+ Add</button>
<div id="json-out"></div>
</div>


<script>
var P=[
{id:'O.apex',x:385,y:77,l:'Outer Apex',c:'o'},
{id:'O.hs.L',x:73,y:621,l:'Outer HS L',c:'o'},
{id:'O.hs.R',x:701,y:621,l:'Outer HS R',c:'o'},
{id:'O.wide.L',x:45,y:476,l:'Outer Wide L',c:'o'},
{id:'O.wide.R',x:729,y:476,l:'Outer Wide R',c:'o'},
{id:'I.apex',x:388,y:122,l:'Inner Apex',c:'i'},
{id:'I.hs.L',x:118,y:634,l:'Inner HS L',c:'i'},
{id:'I.hs.R',x:656,y:634,l:'Inner HS R',c:'i'},
{id:'I.wide.L',x:90,y:476,l:'Inner Wide L',c:'i'},
{id:'I.wide.R',x:684,y:476,l:'Inner Wide R',c:'i'},
{id:'O.leg.L',x:37,y:1262,l:'Outer Leg L',c:'o'},
{id:'O.leg.R',x:737,y:1262,l:'Outer Leg R',c:'o'},
{id:'I.leg.L',x:83,y:1265,l:'Inner Leg L',c:'i'},
{id:'I.leg.R',x:691,y:1265,l:'Inner Leg R',c:'i'},
{id:'O.legTop.L',x:43,y:670,l:'Outer LegTop L',c:'o'},
{id:'O.legTop.R',x:731,y:670,l:'Outer LegTop R',c:'o'},
{id:'I.legTop.L',x:88,y:658,l:'Inner LegTop L',c:'i'},
{id:'I.legTop.R',x:686,y:658,l:'Inner LegTop R',c:'i'},
{id:'O.pinch.L',x:30,y:650,l:'Outer PinchLow L',c:'o'},
{id:'O.pinch.R',x:744,y:650,l:'Outer PinchLow R',c:'o'},
{id:'I.pinch.L',x:75,y:648,l:'Inner PinchLow L',c:'i'},
{id:'I.pinch.R',x:699,y:648,l:'Inner PinchLow R',c:'i'},
];
var IW=774,IH=1280,s=1,act=null,CX=387;
var sym_map={OHL:'O.hs.R',OHR:'O.hs.L',OWL:'O.wide.R',OWR:'O.wide.L',IHL:'I.hs.R',IHR:'I.hs.L',IWL:'I.wide.R',IWR:'I.wide.L',OLL:'O.leg.R',OLR:'O.leg.L',ILL:'I.leg.R',ILR:'I.leg.L',OTLL:'O.legTop.R',OTLR:'O.legTop.L',ITLL:'I.legTop.R',ITLR:'I.legTop.L',OPLL:'O.pinch.R',OPLR:'O.pinch.L',IPLL:'I.pinch.R',IPLR:'I.pinch.L',OTRL:'O.legTop.R',OTRR:'O.legTop.L',ITRL:'I.legTop.R',ITRR:'I.legTop.L'};
// Curves: arcs defined by 3 points (from, through/apex, to)
// Left outer arc: from OHL through OWL to OA
// Right outer arc: from OA through OWR to OHR
// Left inner arc: from IHL through IWL to IA
// Right inner arc: from IA through IWR to IHR
var curves=[
  {pts:['O.hs.L','O.wide.L','O.apex'],c:'o',l:'Outer L arc'},
  {pts:['O.apex','O.wide.R','O.hs.R'],c:'o',l:'Outer R arc'},
  {pts:['I.hs.L','I.wide.L','I.apex'],c:'i',l:'Inner L arc'},
  {pts:['I.apex','I.wide.R','I.hs.R'],c:'i',l:'Inner R arc'},
  {pts:['O.hs.L','O.pinch.L','O.legTop.L'],c:'o',l:'Outer pinch L'},
  {pts:['O.hs.R','O.pinch.R','O.legTop.R'],c:'o',l:'Outer pinch R'},
  {pts:['I.hs.L','I.pinch.L','I.legTop.L'],c:'i',l:'Inner pinch L'},
  {pts:['I.hs.R','I.pinch.R','I.legTop.R'],c:'i',l:'Inner pinch R'},
];
var lines_def=[
  
  {a:'O.legTop.L',b:'O.legTop.L',c:'o'},{a:'O.legTop.R',b:'O.legTop.R',c:'o'},{a:'I.legTop.L',b:'I.legTop.L',c:'i'},{a:'I.legTop.R',b:'I.legTop.R',c:'i'},{a:'O.legTop.L',b:'O.leg.L',c:'o'},{a:'O.legTop.R',b:'O.leg.R',c:'o'},{a:'I.legTop.L',b:'I.leg.L',c:'i'},{a:'I.legTop.R',b:'I.leg.R',c:'i'},
  {a:'O.leg.L',b:'O.leg.R',c:'o'},{a:'I.leg.L',b:'I.leg.R',c:'i'},
];
var meas=[
  {a:'O.wide.L',b:'O.wide.R',l:'Outer W'},{a:'I.wide.L',b:'I.wide.R',l:'Inner W'},
  {a:'O.hs.L',b:'O.hs.R',l:'HS W'},{a:'O.apex',b:'I.apex',l:'Band@Apex'},
];

function fp(id){return P.find(function(p){return p.id===id});}
function sc(){s=document.getElementById('src').offsetWidth/IW;}
function col(c,a){return c==='o'?'rgba(255,68,68,'+(a||1)+')':'rgba(68,136,255,'+(a||1)+')';}

// Fit circle through 3 points
function fitCircle(p1,p2,p3){
  var ax=p1.x,ay=p1.y,bx=p2.x,by=p2.y,cx=p3.x,cy=p3.y;
  var D=2*(ax*(by-cy)+bx*(cy-ay)+cx*(ay-by));
  if(Math.abs(D)<0.001)return null;
  var ux=((ax*ax+ay*ay)*(by-cy)+(bx*bx+by*by)*(cy-ay)+(cx*cx+cy*cy)*(ay-by))/D;
  var uy=((ax*ax+ay*ay)*(cx-bx)+(bx*bx+by*by)*(ax-cx)+(cx*cx+cy*cy)*(bx-ax))/D;
  var r=Math.sqrt((ax-ux)*(ax-ux)+(ay-uy)*(ay-uy));
  return {cx:ux,cy:uy,r:r};
}

function render(){
  sc();
  var wrap=document.getElementById('wrap');
  var cv=document.getElementById('cv');
  cv.width=wrap.offsetWidth*2;cv.height=wrap.offsetHeight*2;
  var cw=wrap.offsetWidth,ch=wrap.offsetHeight;cv.style.width=cw+'px';cv.style.height=ch+'px';
  var ctx=cv.getContext('2d');
  ctx.scale(2,2);
  var S=s; // scale

  // Draw curves (arcs through 3 points)
  curves.forEach(function(cur){
    var p1=fp(cur.pts[0]),p2=fp(cur.pts[1]),p3=fp(cur.pts[2]);
    if(!p1||!p2||!p3)return;
    var circle=fitCircle(p1,p2,p3);
    if(!circle)return;
    var a1=Math.atan2(p1.y-circle.cy,p1.x-circle.cx);
    var a2=Math.atan2(p2.y-circle.cy,p2.x-circle.cx);
    var a3=Math.atan2(p3.y-circle.cy,p3.x-circle.cx);
    // Determine direction: go from a1 through a2 to a3
    ctx.beginPath();
    ctx.strokeStyle=col(cur.c,0.8);
    ctx.lineWidth=2;
    // Draw as polyline through computed arc points
    var steps=60;
    // Find sweep from a1 to a3 passing through a2
    function normA(a){while(a<-Math.PI)a+=2*Math.PI;while(a>Math.PI)a-=2*Math.PI;return a;}
    var d12=normA(a2-a1),d13=normA(a3-a1);
    // If d12 and d13 have same sign and |d12|<|d13|, sweep is d13
    // Otherwise go the other way
    var sweep=d13;
    if(d12*d13<0||(Math.abs(d12)>Math.abs(d13))){sweep=d13>0?d13-2*Math.PI:d13+2*Math.PI;}
    
    for(var i=0;i<=steps;i++){
      var t=i/steps;
      var a=a1+sweep*t;
      var px=circle.cx+circle.r*Math.cos(a);
      var py=circle.cy+circle.r*Math.sin(a);
      if(i===0)ctx.moveTo(px*S,py*S);else ctx.lineTo(px*S,py*S);
    }
    ctx.stroke();
  });

  // Draw lines
  lines_def.forEach(function(ln){
    var a=fp(ln.a),b=fp(ln.b);if(!a||!b)return;
    ctx.beginPath();ctx.strokeStyle=col(ln.c,0.6);ctx.lineWidth=1.5;
    ctx.moveTo(a.x*S,a.y*S);ctx.lineTo(b.x*S,b.y*S);ctx.stroke();
  });

  // Draw measurement lines
  meas.forEach(function(m){
    var a=fp(m.a),b=fp(m.b);if(!a||!b)return;
    ctx.beginPath();ctx.strokeStyle='rgba(255,255,0,0.25)';ctx.lineWidth=0.5;
    ctx.setLineDash([3,3]);ctx.moveTo(a.x*S,a.y*S);ctx.lineTo(b.x*S,b.y*S);ctx.stroke();ctx.setLineDash([]);
    var d=Math.round(Math.sqrt((b.x-a.x)**2+(b.y-a.y)**2));
    ctx.fillStyle='rgba(255,255,0,0.5)';ctx.font='9px SF Mono,monospace';ctx.textAlign='center';
    ctx.fillText(d+'',((a.x+b.x)/2)*S,((a.y+b.y)/2)*S-3);
  });

  // Draw points: dots for unselected, crosshair for selected
  P.forEach(function(p){
    var isA=p.id===act;
    var c=col(p.c);
    if(isA){
      // Crosshair
      ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo((p.x-14)*S,p.y*S);ctx.lineTo((p.x+14)*S,p.y*S);ctx.stroke();
      ctx.beginPath();ctx.moveTo(p.x*S,(p.y-14)*S);ctx.lineTo(p.x*S,(p.y+14)*S);ctx.stroke();
      ctx.beginPath();ctx.arc(p.x*S,p.y*S,5*S,0,Math.PI*2);ctx.strokeStyle='#fff';ctx.stroke();
      ctx.fillStyle='#fff';ctx.font='bold 10px SF Mono';ctx.textAlign='left';
      ctx.fillText(p.id,(p.x+10)*S,(p.y-4)*S);
    } else {
      // Dot
      ctx.beginPath();ctx.arc(p.x*S,p.y*S,3.5*S,0,Math.PI*2);ctx.fillStyle=c;ctx.fill();
      ctx.fillStyle=col(p.c,0.7);ctx.font='9px SF Mono';ctx.textAlign='left';
      ctx.fillText(p.id,(p.x+6)*S,(p.y+3)*S);
    }
  });

  // Panel
  var h='';
  P.forEach(function(p){h+='<div class="row'+(p.id===act?' active':'')+'" onclick="sel(\''+p.id+'\')"><span class="k" style="color:'+col(p.c)+'">'+p.id+'</span><span class="v">('+p.x+','+p.y+')</span></div>';});
  document.getElementById('coords').innerHTML=h;
  var mh='';
  meas.forEach(function(m){var a=fp(m.a),b=fp(m.b);if(!a||!b)return;
    mh+='<div style="color:#888">'+m.l+': <b style="color:#fff">'+Math.round(Math.sqrt((b.x-a.x)**2+(b.y-a.y)**2))+'</b></div>';});
  document.getElementById('measures').innerHTML=mh;
  document.getElementById('albl').textContent=act?'→ '+act:'';
}

function sel(id){act=(act===id)?null:id;render();}

document.getElementById('wrap').addEventListener('click',function(e){
  if(!act)return;sc();
  var r=this.getBoundingClientRect();
  var x=Math.round((e.clientX-r.left)/(s*zoom)),y=Math.round((e.clientY-r.top)/(s*zoom));
  x=Math.max(0,Math.min(IW,x));y=Math.max(0,Math.min(IH,y));
  var p=fp(act);if(!p)return;p.x=x;p.y=y;
  if(document.getElementById('sym').checked&&sym_map[act]){var m=fp(sym_map[act]);if(m){m.x=2*CX-x;m.y=y;}}
  render();
});

function doExport(){var o={};P.forEach(function(p){o[p.id]={x:p.x,y:p.y,label:p.l};});
  var j=JSON.stringify(o,null,2);
  // Save to URL hash for easy sharing
  var compact=JSON.stringify(P.map(function(p){return{id:p.id,x:p.x,y:p.y};}));
  window.location.hash=btoa(compact);
  navigator.clipboard.writeText(j).then(function(){document.getElementById('json-out').textContent='✅ Copied + saved to URL!\n'+j;}).catch(function(){document.getElementById('json-out').textContent='Saved to URL\n'+j;});}
function doAdd(){var id=prompt('ID:');if(!id)return;var l=prompt('Label:')||id;var c=prompt('o/i?')||'o';P.push({id:id,x:Math.round(IW/2),y:Math.round(IH/2),l:l,c:c});act=id;render();}
// Load saved points from URL hash
if(window.location.hash.length>1){
  try{
    var saved=JSON.parse(atob(window.location.hash.slice(1)));
    saved.forEach(function(sp){
      var p=fp(sp.id);
      if(p){p.x=sp.x;p.y=sp.y;}
    });
  }catch(e){console.log('hash parse error',e);}
}
document.getElementById('src').onload=render;
window.addEventListener('resize',render);

var zoom=1,panX=0,panY=0,isPanning=false,panStart={x:0,y:0};

// Scroll to zoom (centered on cursor)
document.addEventListener('wheel',function(e){
  e.preventDefault();
  var wrap=document.getElementById('wrap');
  var rect=wrap.getBoundingClientRect();
  var dz=e.deltaY>0?0.9:1.1;
  var nz=Math.max(0.5,Math.min(8,zoom*dz));
  // Zoom centered on cursor position
  var cx=e.clientX,cy=e.clientY;
  panX=cx-(cx-panX)*(nz/zoom);
  panY=cy-(cy-panY)*(nz/zoom);
  zoom=nz;
  wrap.style.transform='translate('+panX+'px,'+panY+'px) scale('+zoom+')';
  render();
},{passive:false});

// Two-finger pinch zoom on mobile
var lastDist=0;
document.addEventListener('touchstart',function(e){
  if(e.touches.length===2){
    var dx=e.touches[0].clientX-e.touches[1].clientX;
    var dy=e.touches[0].clientY-e.touches[1].clientY;
    lastDist=Math.sqrt(dx*dx+dy*dy);
  }
});
document.addEventListener('touchmove',function(e){
  if(e.touches.length===2){
    e.preventDefault();
    var dx=e.touches[0].clientX-e.touches[1].clientX;
    var dy=e.touches[0].clientY-e.touches[1].clientY;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(lastDist>0){
      var dz=dist/lastDist;
      zoom=Math.max(0.5,Math.min(8,zoom*dz));
      document.getElementById('wrap').style.transform='translate('+panX+'px,'+panY+'px) scale('+zoom+')';
      render();
    }
    lastDist=dist;
  }
},{passive:false});

// Double-tap to reset zoom
var lastTap=0;
document.addEventListener('touchend',function(e){
  var now=Date.now();
  if(now-lastTap<300&&e.changedTouches.length===1){
    zoom=1;panX=0;panY=0;
    document.getElementById('wrap').style.transform='';
    render();
  }
  lastTap=now;
});

// Right-click drag to pan (desktop)
document.addEventListener('mousedown',function(e){
  if(e.button===2||e.button===1){isPanning=true;panStart={x:e.clientX-panX,y:e.clientY-panY};e.preventDefault();}
});
document.addEventListener('mousemove',function(e){
  if(isPanning){
    panX=e.clientX-panStart.x;panY=e.clientY-panStart.y;
    document.getElementById('wrap').style.transform='translate('+panX+'px,'+panY+'px) scale('+zoom+')';
  }
});
document.addEventListener('mouseup',function(e){if(e.button===2||e.button===1)isPanning=false;});
document.addEventListener('contextmenu',function(e){e.preventDefault();});
</script>
</body></html>
