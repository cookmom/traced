<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Traced — Point Editor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a1a;color:#eee;font-family:'SF Mono',monospace;overflow:hidden}
#wrap{position:relative;display:inline-block}
#wrap img{display:block;max-height:100vh;max-width:100vw}
.pt{position:absolute;width:24px;height:24px;margin:-12px;cursor:move;z-index:10}
.pt::before,.pt::after{content:'';position:absolute;background:currentColor}
.pt::before{width:24px;height:2px;top:11px;left:0}
.pt::after{width:2px;height:24px;top:0;left:11px}
.pt .dot{width:8px;height:8px;border:2px solid currentColor;border-radius:50%;position:absolute;top:6px;left:6px}
.pt .lbl{position:absolute;left:16px;top:-8px;font-size:11px;white-space:nowrap;background:rgba(0,0,0,0.8);padding:1px 4px;border-radius:2px;pointer-events:none}
.outer{color:#ff4444}
.inner{color:#4488ff}
#panel{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.9);padding:12px;border-radius:8px;z-index:100;max-height:90vh;overflow-y:auto;width:280px}
#panel h3{margin-bottom:8px;font-size:13px;color:#888}
#panel .row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;border-bottom:1px solid #333}
#panel .row .k{color:#aaa}
#panel .row .v{color:#fff}
#export{margin-top:10px;padding:6px 12px;background:#c0392b;color:#fff;border:none;border-radius:4px;cursor:pointer;font-family:inherit;font-size:12px;width:100%}
#export:hover{background:#e74c3c}
#add{margin-top:6px;padding:6px 12px;background:#2980b9;color:#fff;border:none;border-radius:4px;cursor:pointer;font-family:inherit;font-size:12px;width:100%}
#json-out{margin-top:8px;font-size:10px;color:#666;word-break:break-all;max-height:200px;overflow-y:auto}
</style>
</head><body>
<div id="wrap">
<img id="src" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
</div>
<div id="panel">
<h3>Feature Points</h3>
<div id="coords"></div>
<button id="export" onclick="exportJSON()">📋 Copy JSON</button>
<button id="add" onclick="addPoint()">+ Add Point</button>
<div id="json-out"></div>
</div>

<script>
var points = [
  {id:'OA', x:387, y:136, label:'Outer Apex', cls:'outer'},
  {id:'OHL', x:100, y:480, label:'Outer HS Left', cls:'outer'},
  {id:'OHR', x:675, y:480, label:'Outer HS Right', cls:'outer'},
  {id:'OWL', x:85, y:380, label:'Outer Wide L', cls:'outer'},
  {id:'OWR', x:690, y:380, label:'Outer Wide R', cls:'outer'},
  {id:'IA', x:387, y:170, label:'Inner Apex', cls:'inner'},
  {id:'IHL', x:135, y:480, label:'Inner HS Left', cls:'inner'},
  {id:'IHR', x:640, y:480, label:'Inner HS Right', cls:'inner'},
  {id:'IWL', x:120, y:380, label:'Inner Wide L', cls:'inner'},
  {id:'IWR', x:655, y:380, label:'Inner Wide R', cls:'inner'},
  {id:'OLL', x:100, y:1218, label:'Outer Leg Btm L', cls:'outer'},
  {id:'OLR', x:675, y:1218, label:'Outer Leg Btm R', cls:'outer'},
  {id:'ILL', x:135, y:1218, label:'Inner Leg Btm L', cls:'inner'},
  {id:'ILR', x:640, y:1218, label:'Inner Leg Btm R', cls:'inner'},
];

var imgW=774, imgH=1280, scale=1;
var dragging=null, dragOff={x:0,y:0};

function init(){
  // Load source image
  var img = document.getElementById('src');
  img.src = 'real-test.jpg'; // relative path
  img.onload = function(){
    scale = img.offsetWidth / imgW;
    renderPoints();
  };
  // Fallback: try from GitHub Pages
  img.onerror = function(){
    // Use the base64 from the page if available, or a URL
    this.src = 'https://cookmom.github.io/traced/real-test.jpg';
  };
}

function renderPoints(){
  // Remove old
  document.querySelectorAll('.pt').forEach(e=>e.remove());
  var wrap = document.getElementById('wrap');
  scale = document.getElementById('src').offsetWidth / imgW;
  
  points.forEach(function(p){
    var el = document.createElement('div');
    el.className = 'pt ' + p.cls;
    el.style.left = (p.x * scale) + 'px';
    el.style.top = (p.y * scale) + 'px';
    el.innerHTML = '<div class="dot"></div><div class="lbl">' + p.id + '</div>';
    el.dataset.id = p.id;
    
    el.addEventListener('pointerdown', function(e){
      dragging = p;
      var rect = el.getBoundingClientRect();
      dragOff.x = e.clientX - rect.left - 12;
      dragOff.y = e.clientY - rect.top - 12;
      e.preventDefault();
    });
    
    wrap.appendChild(el);
  });
  updatePanel();
}

document.addEventListener('pointermove', function(e){
  if(!dragging) return;
  var wrap = document.getElementById('wrap');
  var rect = wrap.getBoundingClientRect();
  var x = (e.clientX - rect.left - dragOff.x) / scale;
  var y = (e.clientY - rect.top - dragOff.y) / scale;
  dragging.x = Math.round(Math.max(0, Math.min(imgW, x)));
  dragging.y = Math.round(Math.max(0, Math.min(imgH, y)));
  var el = document.querySelector('[data-id="'+dragging.id+'"]');
  if(el){
    el.style.left = (dragging.x * scale) + 'px';
    el.style.top = (dragging.y * scale) + 'px';
  }
  updatePanel();
});

document.addEventListener('pointerup', function(){
  dragging = null;
});

function updatePanel(){
  var html = '';
  points.forEach(function(p){
    html += '<div class="row"><span class="k">'+p.id+'</span><span class="v">('+p.x+', '+p.y+')</span></div>';
  });
  document.getElementById('coords').innerHTML = html;
}

function exportJSON(){
  var obj = {};
  points.forEach(function(p){ obj[p.id] = {x:p.x, y:p.y, label:p.label}; });
  var json = JSON.stringify(obj, null, 2);
  navigator.clipboard.writeText(json).then(function(){
    document.getElementById('json-out').textContent = '✅ Copied!\n' + json;
  }).catch(function(){
    document.getElementById('json-out').textContent = json;
  });
}

function addPoint(){
  var id = prompt('Point ID (e.g. XY):');
  if(!id) return;
  var label = prompt('Label:') || id;
  var cls = prompt('outer or inner?') || 'outer';
  points.push({id:id, x:imgW/2, y:imgH/2, label:label, cls:cls});
  renderPoints();
}

window.addEventListener('resize', renderPoints);
init();
</script>
</body></html>
