<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Traced — Arch Pattern Options</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f2eada;overflow:hidden;display:flex;justify-content:center;align-items:flex-start}
#wrap{position:relative;height:100vh;width:calc(100vh*774/1280)}
#ref-src{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0.22;filter:grayscale(100%);z-index:1}
canvas{position:absolute;top:0;left:0;width:100%!important;height:100%!important;z-index:2}
#controls{position:fixed;top:10px;right:10px;z-index:10;background:rgba(0,0,0,0.7);color:#fff;padding:12px;border-radius:8px;font:13px monospace}
#controls button{display:block;width:100%;margin:4px 0;padding:8px;border:1px solid #666;background:#333;color:#fff;cursor:pointer;border-radius:4px;font:13px monospace;text-align:left}
#controls button:hover{background:#555}
#controls button.active{background:#c0392b;border-color:#e74c3c}
</style>
</head><body>
<div id="wrap">
<img id="ref-src" src="real-test-mono.jpg" onerror="this.src='https://cookmom.github.io/traced/real-test-mono.jpg'">
</div>
<div id="controls">
<b>Top Half Option:</b>
<button onclick="setOption('A')" id="btnA">A: 6-fold hex (same as bottom)</button>
<button onclick="setOption('B')" id="btnB">B: Concentric arc bands</button>
<button onclick="setOption('C')" id="btnC">C: Radial from apex</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/p5@2.0.3/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/p5.brush@2.0.2-beta"></script>
<script>
var W=774, H=1280;
var currentOption = 'A';

function setOption(opt) {
    currentOption = opt;
    document.querySelectorAll('#controls button').forEach(function(b){b.className='';});
    document.getElementById('btn'+opt).className='active';
    redraw();
}

// Circle intersection
function circleIntersections(x1,y1,r1,x2,y2,r2){
    var dx=x2-x1,dy=y2-y1,d=Math.sqrt(dx*dx+dy*dy);
    if(d>r1+r2||d<Math.abs(r1-r2)||d===0)return[];
    var a=(r1*r1-r2*r2+d*d)/(2*d),h=Math.sqrt(Math.max(0,r1*r1-a*a));
    var mx=x1+a*dx/d,my=y1+a*dy/d,px=-dy*h/d,py=dx*h/d;
    return[[mx+px,my+py],[mx-px,my-py]];
}

// Generate emergent pattern from circle grid within arch
function archEmergent(archC, yStart, yEnd, gridSize) {
    var r=gridSize/2, margin=gridSize, centers=[];
    var rowH=gridSize*Math.sqrt(3)/2, row=0;
    for(var y=yStart-margin;y<=yEnd+margin;y+=rowH){
        var offset=(row%2)*gridSize/2;
        var dy=y-archC.cy;
        if(Math.abs(dy)>=archC.r){row++;continue;}
        var dx=Math.sqrt(archC.r*archC.r-dy*dy);
        var xL=archC.cx-dx+8, xR=387+(387-xL);
        for(var x=xL-margin;x<=xR+margin;x+=gridSize){
            if(x+offset>xL-gridSize&&x+offset<xR+gridSize)
                centers.push([x+offset,y]);
        }
        row++;
    }
    var pts=new Map();
    function ptKey(x,y){return Math.round(x*10)+','+Math.round(y*10);}
    for(var i=0;i<centers.length;i++)for(var j=i+1;j<centers.length;j++){
        var ddx=centers[j][0]-centers[i][0],ddy=centers[j][1]-centers[i][1];
        var dist=Math.sqrt(ddx*ddx+ddy*ddy);
        if(dist<gridSize*1.15&&dist>0.1){
            var isects=circleIntersections(centers[i][0],centers[i][1],r,centers[j][0],centers[j][1],r);
            for(var k=0;k<isects.length;k++){
                var key=ptKey(isects[k][0],isects[k][1]);
                if(!pts.has(key))pts.set(key,isects[k]);
            }
        }
    }
    var lines=[];
    for(var i=0;i<centers.length;i++){
        var cx=centers[i][0],cy=centers[i][1],onC=[];
        pts.forEach(function(pt){
            var ddx=pt[0]-cx,ddy=pt[1]-cy;
            if(Math.abs(Math.sqrt(ddx*ddx+ddy*ddy)-r)<1.5)
                onC.push({x:pt[0],y:pt[1],angle:Math.atan2(ddy,ddx)});
        });
        onC.sort(function(a,b){return a.angle-b.angle;});
        for(var k=0;k<onC.length;k++){
            var next=(k+1)%onC.length;
            var p1=onC[k],p2=onC[next];
            // Clip to arch
            var dy1=p1.y-archC.cy,dy2=p2.y-archC.cy;
            var ok1=Math.abs(dy1)<archC.r&&Math.abs(p1.x-387)<Math.sqrt(Math.max(0,archC.r*archC.r-dy1*dy1))+5;
            var ok2=Math.abs(dy2)<archC.r&&Math.abs(p2.x-387)<Math.sqrt(Math.max(0,archC.r*archC.r-dy2*dy2))+5;
            // Also clip to y range
            if(ok1&&ok2&&p1.y>=yStart-5&&p1.y<=yEnd+5&&p2.y>=yStart-5&&p2.y<=yEnd+5)
                lines.push([p1.x,p1.y,p2.x,p2.y]);
        }
    }
    return lines;
}

// Option B: Concentric arc bands with cross-hatching
function concentricBands(archC, yStart, yEnd, nBands) {
    var lines = [];
    var rStart = Math.sqrt(Math.pow(387-archC.cx,2)+Math.pow(yEnd-archC.cy,2));
    var rEnd = Math.sqrt(Math.pow(387-archC.cx,2)+Math.pow(yStart-archC.cy,2));

    for (var b = 0; b < nBands; b++) {
        var t = b / (nBands-1);
        var br = rStart + (rEnd - rStart) * t;
        // Arc from left to right through the arch
        var prevX=null, prevY=null;
        for (var i = 0; i <= 60; i++) {
            var a = -PI*0.85 + (i/60)*PI*0.70;
            var px = archC.cx + br*Math.cos(a);
            var py = archC.cy + br*Math.sin(a);
            // Clip to y range and arch
            var dy = py - archC.cy;
            if (py >= yStart && py <= yEnd && Math.abs(dy) < archC.r) {
                var maxDx = Math.sqrt(archC.r*archC.r - dy*dy);
                if (Math.abs(px-387) < maxDx+3) {
                    if (prevX !== null) lines.push([prevX,prevY,px,py]);
                    prevX=px; prevY=py;
                } else { prevX=null; }
            } else { prevX=null; }
        }
    }

    // Cross-hatching: radial lines between bands
    var nRadials = 20;
    for (var i = 0; i < nRadials; i++) {
        var t = i / (nRadials-1);
        var a = -PI*0.82 + t*PI*0.64;
        var x1 = archC.cx + rStart*Math.cos(a);
        var y1 = archC.cy + rStart*Math.sin(a);
        var x2 = archC.cx + rEnd*Math.cos(a);
        var y2 = archC.cy + rEnd*Math.sin(a);
        if (y1 >= yStart && y2 >= yStart && y1 <= yEnd && y2 <= yEnd)
            lines.push([x1,y1,x2,y2]);
    }
    return lines;
}

// Option C: Radial star from apex point
function radialFromApex(archC, yStart, yEnd, nRays, nRings) {
    var lines = [];
    var apexX = 387, apexY = yStart;

    // Rays from apex
    for (var i = 0; i < nRays; i++) {
        var t = i / (nRays-1);
        var a = PI*0.15 + t*PI*0.70; // spread across arch opening
        var rayLen = (yEnd - yStart) * 1.5;
        var ex = apexX + rayLen*Math.cos(a);
        var ey = apexY + rayLen*Math.sin(a);
        // Clip to arch
        var steps = 40, prevX=null, prevY=null;
        for (var s = 0; s <= steps; s++) {
            var st = s/steps;
            var px = apexX + (ex-apexX)*st;
            var py = apexY + (ey-apexY)*st;
            var dy = py - archC.cy;
            if (py >= yStart && py <= yEnd && Math.abs(dy) < archC.r) {
                var maxDx = Math.sqrt(archC.r*archC.r - dy*dy);
                if (Math.abs(px-387) < maxDx+3) {
                    if (prevX !== null) lines.push([prevX,prevY,px,py]);
                    prevX=px; prevY=py;
                } else { prevX=null; }
            } else { prevX=null; }
        }
    }

    // Concentric arcs as rings
    for (var ring = 1; ring <= nRings; ring++) {
        var ringR = ring * (yEnd-yStart) / (nRings+1);
        var prevX=null, prevY=null;
        for (var i = 0; i <= 40; i++) {
            var a = i/40 * TAU;
            var px = apexX + ringR*Math.cos(a);
            var py = apexY + ringR*Math.sin(a);
            var dy = py - archC.cy;
            if (py >= yStart && py <= yEnd && Math.abs(dy) < archC.r) {
                var maxDx = Math.sqrt(archC.r*archC.r - dy*dy);
                if (Math.abs(px-387) < maxDx+3) {
                    if (prevX !== null) lines.push([prevX,prevY,px,py]);
                    prevX=px; prevY=py;
                } else { prevX=null; }
            } else { prevX=null; }
        }
    }
    return lines;
}

function drawLines(lines,sw,alpha){
    push();stroke(192,57,43,alpha);strokeWeight(sw);noFill();
    for(var i=0;i<lines.length;i++)line(lines[i][0],lines[i][1],lines[i][2],lines[i][3]);
    pop();
}

function fitCircle3(p1,p2,p3){
    var ax=p1[0],ay=p1[1],bx=p2[0],by=p2[1],cx=p3[0],cy=p3[1];
    var D=2*(ax*(by-cy)+bx*(cy-ay)+cx*(ay-by));
    if(Math.abs(D)<0.01)return null;
    var ux=((ax*ax+ay*ay)*(by-cy)+(bx*bx+by*by)*(cy-ay)+(cx*cx+cy*cy)*(ay-by))/D;
    var uy=((ax*ax+ay*ay)*(cx-bx)+(bx*bx+by*by)*(ax-cx)+(cx*cx+cy*cy)*(bx-ax))/D;
    return{cx:ux,cy:uy,r:Math.sqrt((ax-ux)*(ax-ux)+(ay-uy)*(ay-uy))};
}
function drawArc3(p1,p2,p3){
    var c=fitCircle3(p1,p2,p3);if(!c)return c;
    var a1=Math.atan2(p1[1]-c.cy,p1[0]-c.cx),a2=Math.atan2(p2[1]-c.cy,p2[0]-c.cx),a3=Math.atan2(p3[1]-c.cy,p3[0]-c.cx);
    var d12=a2-a1,d13=a3-a1;
    while(d12>Math.PI)d12-=TAU;while(d12<-Math.PI)d12+=TAU;
    while(d13>Math.PI)d13-=TAU;while(d13<-Math.PI)d13+=TAU;
    var sw=d13;if(d12*d13<0||(Math.abs(d12)>Math.abs(d13)))sw=d13>0?d13-TAU:d13+TAU;
    beginShape();for(var i=0;i<=60;i++){var t=i/60;var a=a1+sw*t;vertex(c.cx+c.r*Math.cos(a),c.cy+c.r*Math.sin(a));}endShape();
    return c;
}
function drawArc2(p1,p3,off){var mx=(p1[0]+p3[0])/2+off,my=(p1[1]+p3[1])/2;drawArc3(p1,[mx,my],p3);}

function setup(){
    createCanvas(W,H,WEBGL);pixelDensity(1);brush.load();
    select('canvas').parent('wrap');
}

function draw(){
    translate(-W/2,-H/2);
    clear();
    noFill();

    var p={
        OA:[387,78],OhL:[73,621],OhR:[701,621],OwL:[46,475],OwR:[728,475],
        IA:[387,122],IhL:[118,635],IhR:[656,635],IwL:[89,476],IwR:[685,476],
        OpL:[55,671],OpR:[719,671],IpL:[102,656],IpR:[672,656],
        OtL:[43,670],OtR:[731,670],ItL:[88,658],ItR:[686,658]
    };

    var archC=fitCircle3(p.IhL,p.IwL,p.IA);
    if(!archC)return;

    var splitY = 378; // midpoint of arch

    // ========== BANKED: Bottom half arch pattern (6-fold emergent) ==========
    var bottomLines = archEmergent(archC, splitY, 630, 32);
    drawLines(bottomLines, 1.0, 140);

    // ========== TOP HALF: selected option ==========
    if (currentOption === 'A') {
        var topLines = archEmergent(archC, 130, splitY, 32);
        drawLines(topLines, 1.0, 140);
    } else if (currentOption === 'B') {
        var topLines = concentricBands(archC, 130, splitY, 12);
        drawLines(topLines, 0.9, 140);
    } else if (currentOption === 'C') {
        var topLines = radialFromApex(archC, 130, splitY, 24, 8);
        drawLines(topLines, 0.9, 140);
    }

    // ========== STRUCTURE ==========
    stroke(192,57,43);strokeWeight(3);noFill();
    drawArc3(p.OhL,p.OwL,p.OA);drawArc3(p.OA,p.OwR,p.OhR);
    drawArc3(p.IhL,p.IwL,p.IA);drawArc3(p.IA,p.IwR,p.IhR);
    strokeWeight(2);
    drawArc2(p.OhL,p.OpL,-6);drawArc2(p.OhR,p.OpR,6);
    drawArc2(p.IhL,p.IpL,-5);drawArc2(p.IhR,p.IpR,5);
    strokeWeight(3);
    line(p.OpL[0],p.OpL[1],p.OtL[0],p.OtL[1]);line(p.OpR[0],p.OpR[1],p.OtR[0],p.OtR[1]);
    line(p.IpL[0],p.IpL[1],p.ItL[0],p.ItL[1]);line(p.IpR[0],p.IpR[1],p.ItR[0],p.ItR[1]);
    line(43,670,43,1244);line(731,670,731,1244);
    line(88,658,88,1244);line(686,658,686,1244);
    strokeWeight(4);
    line(27,50,27,1244);line(747,50,747,1244);line(27,1244,747,1244);line(27,50,747,50);
    strokeWeight(2.5);line(387,122,387,1218);
    strokeWeight(2);
    line(88,658,686,658);line(88,881,686,881);line(88,1049,686,1049);line(88,1218,686,1218);
    line(27,1265,747,1265);
}
</script>
</body></html>
