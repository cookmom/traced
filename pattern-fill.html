<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Traced — Islamic Pattern Fill</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f2eada;overflow:hidden;display:flex;justify-content:center;align-items:flex-start}
#wrap{position:relative;height:100vh;width:calc(100vh*774/1280)}
#ref-src{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0.3;filter:grayscale(100%);z-index:1}
canvas{position:absolute;top:0;left:0;width:100%!important;height:100%!important;z-index:2}
</style>
</head><body>
<div id="wrap">
<img id="ref-src" src="real-test-mono.jpg" onerror="this.src='https://cookmom.github.io/traced/real-test-mono.jpg'">
</div>
<script src="https://cdn.jsdelivr.net/npm/p5@2.0.3/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/p5.brush@2.0.2-beta"></script>
<script>
var W=774, H=1280;

function drawStar8(cx, cy, r) {
    beginShape();
    for(var i=0; i<8; i++) {
        var a = i * Math.PI/4 - Math.PI/8;
        vertex(cx + r * Math.cos(a), cy + r * Math.sin(a));
        var midA = a + Math.PI/8;
        vertex(cx + r*0.38 * Math.cos(midA), cy + r*0.38 * Math.sin(midA));
    }
    endShape(CLOSE);
}

function drawRosette(cx, cy, r, n) {
    for(var i=0; i<n; i++) {
        var a1 = i * 2*Math.PI/n;
        var a2 = (i+1) * 2*Math.PI/n;
        var mx = cx + r*0.7*Math.cos((a1+a2)/2);
        var my = cy + r*0.7*Math.sin((a1+a2)/2);
        beginShape();
        for(var j=0;j<=8;j++){
            var tj=j/8;
            var bx=(1-tj)*(1-tj)*(cx+r*0.3*Math.cos(a1))+2*(1-tj)*tj*mx+tj*tj*(cx+r*0.3*Math.cos(a2));
            var by=(1-tj)*(1-tj)*(cy+r*0.3*Math.sin(a1))+2*(1-tj)*tj*my+tj*tj*(cy+r*0.3*Math.sin(a2));
            vertex(bx,by);
        }
        endShape();
    }
    ellipse(cx, cy, r*0.6, r*0.6);
}

function fillPanel(x, y, w, h, tileSize) {
    push();
    stroke(192,57,43,160);
    strokeWeight(0.8);
    noFill();
    var cols = Math.ceil(w / tileSize) + 1;
    var rows = Math.ceil(h / tileSize) + 1;
    for(var row=0; row<rows; row++) {
        for(var col=0; col<cols; col++) {
            var px = x + col * tileSize + tileSize/2;
            var py = y + row * tileSize + tileSize/2;
            if(px > x && px < x+w && py > y && py < y+h) {
                drawStar8(px, py, tileSize*0.4);
            }
        }
    }
    pop();
}

function fitCircle3(p1,p2,p3){
    var ax=p1[0],ay=p1[1],bx=p2[0],by=p2[1],cx=p3[0],cy=p3[1];
    var D=2*(ax*(by-cy)+bx*(cy-ay)+cx*(ay-by));
    if(Math.abs(D)<0.01)return null;
    var ux=((ax*ax+ay*ay)*(by-cy)+(bx*bx+by*by)*(cy-ay)+(cx*cx+cy*cy)*(ay-by))/D;
    var uy=((ax*ax+ay*ay)*(cx-bx)+(bx*bx+by*by)*(ax-cx)+(cx*cx+cy*cy)*(bx-ax))/D;
    return{cx:ux,cy:uy,r:Math.sqrt((ax-ux)*(ax-ux)+(ay-uy)*(ay-uy))};
}

function drawArc3(p1,p2,p3){
    var c=fitCircle3(p1,p2,p3); if(!c)return;
    var a1=Math.atan2(p1[1]-c.cy,p1[0]-c.cx);
    var a2=Math.atan2(p2[1]-c.cy,p2[0]-c.cx);
    var a3=Math.atan2(p3[1]-c.cy,p3[0]-c.cx);
    var d12=a2-a1,d13=a3-a1;
    while(d12>Math.PI)d12-=2*Math.PI;while(d12<-Math.PI)d12+=2*Math.PI;
    while(d13>Math.PI)d13-=2*Math.PI;while(d13<-Math.PI)d13+=2*Math.PI;
    var sw=d13;
    if(d12*d13<0||(Math.abs(d12)>Math.abs(d13)))sw=d13>0?d13-2*Math.PI:d13+2*Math.PI;
    beginShape();
    for(var i=0;i<=60;i++){var t=i/60;var a=a1+sw*t;vertex(c.cx+c.r*Math.cos(a),c.cy+c.r*Math.sin(a));}
    endShape();
}

function drawArc2(p1,p3,off){
    var mx=(p1[0]+p3[0])/2+off,my=(p1[1]+p3[1])/2;
    drawArc3(p1,[mx,my],p3);
}

function setup() {
    createCanvas(W, H, WEBGL);
    pixelDensity(1);
    brush.load();
    select('canvas').parent('wrap');
    noLoop();
}

function draw() {
    translate(-W/2, -H/2);

    var p = {
        'OA':[387,78],'OhL':[73,621],'OhR':[701,621],'OwL':[46,475],'OwR':[728,475],
        'IA':[387,122],'IhL':[118,635],'IhR':[656,635],'IwL':[89,476],'IwR':[685,476],
        'OpL':[55,671],'OpR':[719,671],'IpL':[102,656],'IpR':[672,656],
        'OtL':[43,670],'OtR':[731,670],'ItL':[88,658],'ItR':[686,658]
    };

    // Structure (heavy)
    stroke(192,57,43); strokeWeight(3); noFill();
    drawArc3(p.OhL,p.OwL,p.OA); drawArc3(p.OA,p.OwR,p.OhR);
    drawArc3(p.IhL,p.IwL,p.IA); drawArc3(p.IA,p.IwR,p.IhR);

    strokeWeight(2);
    drawArc2(p.OhL,p.OpL,-6); drawArc2(p.OhR,p.OpR,6);
    drawArc2(p.IhL,p.IpL,-5); drawArc2(p.IhR,p.IpR,5);

    strokeWeight(3);
    line(p.OpL[0],p.OpL[1],p.OtL[0],p.OtL[1]); line(p.OpR[0],p.OpR[1],p.OtR[0],p.OtR[1]);
    line(p.IpL[0],p.IpL[1],p.ItL[0],p.ItL[1]); line(p.IpR[0],p.IpR[1],p.ItR[0],p.ItR[1]);
    line(43,670,43,1244); line(731,670,731,1244);
    line(88,658,88,1244); line(686,658,686,1244);

    // Outer frame
    strokeWeight(4);
    line(27,50,27,1244); line(747,50,747,1244); line(27,1244,747,1244);

    // Door
    strokeWeight(2);
    line(382,122,382,1218);
    line(88,658,382,658); line(382,658,686,658);
    line(88,881,686,881); line(88,1049,686,1049); line(88,1218,686,1218);

    line(27,1265,747,1265);

    // Knocker
    ellipse(395,680,40,40); ellipse(395,680,70,70);
    strokeWeight(1);
    for(var i=0;i<12;i++){var a=i*Math.PI/6;line(395+20*Math.cos(a),680+20*Math.sin(a),395+35*Math.cos(a),680+35*Math.sin(a));}

    // Pattern fills
    fillPanel(95, 665, 280, 210, 35);
    fillPanel(390, 665, 290, 210, 35);
    fillPanel(95, 888, 280, 155, 30);
    fillPanel(390, 888, 290, 155, 30);
    fillPanel(95, 1055, 280, 160, 28);
    fillPanel(390, 1055, 290, 160, 28);

    // Arch zone rosettes
    push();
    stroke(192,57,43,100); strokeWeight(0.5); noFill();
    for(var y=140; y<640; y+=25) {
        var c = fitCircle3(p.IhL,p.IwL,p.IA);
        if(!c) continue;
        var dy = y - c.cy;
        if(Math.abs(dy) >= c.r) continue;
        var dx = Math.sqrt(c.r*c.r - dy*dy);
        var xL = c.cx - dx + 10;
        var xR = 774 - xL;
        var rw = xR - xL;
        if(rw < 30) continue;
        var cols = Math.floor(rw / 25);
        var off = xL + (rw - cols*25)/2;
        for(var col=0; col<cols; col++) {
            drawRosette(off + col*25 + 12, y + 12, 10, 8);
        }
    }
    pop();
}
</script>
</body></html>
